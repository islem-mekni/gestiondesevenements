<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Gestion des membres</title>
  <link rel="stylesheet" href="style.css">

</head>
<body>
  <!-- HEADER -->
  <div id="header">
    <nav>
      <a href="index.html">Accueil</a>
      <a href="livres.html">Livres</a>
    </nav>
  </div>
  <!-- MAIN -->
  <div id="main">

    <!-- FORMULAIRE -->
    <div class="card">
      <h2>Ajouter un membre</h2>
      <form id="form-membre">

        <div class="ligne">
          <div class="champ">
            <label>Nom :</label>
            <input type="text" id="nom" placeholder="Votre nom">

          </div>
          <div class="champ">
            <label>Prenom :</label>
            <input type="text" id="prenom" placeholder="Votre prenom">

          </div>
          <div class="champ">
            <label>Email :</label>
            <input type="email" id="email" placeholder="Votre email">

          </div>
          <div class="champ">
            <label>Categorie :</label>
            <select id="categorie">

              <option>-- Choisir --</option>
              <option>Drame</option>
              <option>Romence</option>
              <option>science fiction </option>
            </select>
          </div>
        </div>
        <button type="button" onclick="ajouterMembre()">Ajouter</button>

        <button type="reset">Effacer</button>
        </form>
    </div>
    <div class="card">
      <h2>Liste des membres</h2>
      <table id="tableau">

        <tr>
            <th>Nom</th>
            <th>Prénom</th>
            <th>Email</th>
            <th>categorie</th>
            <th>Actions</th>
        </tr>
      </table>
    </div>
  </div>
  <div id="footer">Its my application</div>
  <script src="script.js"></script>
</body>
</html>
