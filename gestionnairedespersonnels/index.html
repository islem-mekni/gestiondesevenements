<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Gestion des personnels</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- HEADER -->
  <div id="header">
    <img src="img/logo_polytech.png" id="logo">

    <nav>
      <a href="index.html">Accueil</a>
      <a href="personnels.html">Personnels</a>
      <a href="carriere.html">Carriere</a>
    </nav>
  </div>
  <!-- MAIN -->
  <div id="main">

    <!-- FORMULAIRE -->
    <div class="card">
      <h2>Ajouter un personnel</h2>
      <form id="form-personnel">

        <div class="ligne">
          <div class="champ">
            <label>Nom :</label>
            <input type="text" id="nom" placeholder="Votre nom">

          </div>
          <div class="champ">
            <label>Prénom :</label>
            <input type="text" id="prenom" placeholder="Votre prénom">

          </div>
        </div>
        <div class="ligne">
          <div class="champ">
            <label>Email :</label>
            <input type="email" id="email" placeholder="Votre email">

          </div>
          <div class="champ">
            <label>Niveau :</label>
            <select id="niveau">

              <option>-- Choisir --</option>
              <option>Licence 1</option>
              <option>Licence 2</option>
            </select>
          </div>
        </div>
        <div class="ligne">
          <div class="champ">
            <label>Date de naissance :</label>
            <input type="date" id="date-naissance">

          </div>
          <div class="champ">
            <label>Filière :</label>
            <select id="filiere">

              <option>-- Choisir --</option>
              <option>Informatique</option>
              <option>Electronique</option>
            </select>
          </div>
        </div>
        <button type="button" onclick="ajouterPersonnel()">Ajouter</button>

        <button type="reset">Effacer</button>
      </form>
    </div>
    <!-- TABLEAU -->
    <div class="card">
      <h2>Liste des personnels</h2>
      <table id="tableau">

        <tr><th>Nom</th><th>Prénom</th><th>Email</th><th>Niveau</th><th>Actions</th></tr>
      </table>
    </div>
  </div>
  <div id="footer">Its my application</div>
</body>
</html>
